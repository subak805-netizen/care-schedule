<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>요양보호사 근무표</title>
<style>
:root{
  --bg:#f5f5f7; --card:#ffffff; --card-2:#fbfbfd;
  --line:#e7e7ec; --line-strong:#d6d6dc;
  --txt:#1d1d1f; --sub:#86868b;
  --accent:#0071e3; --accent-soft:#eaf2fd;
  --c-D:#d9ebff; --c-Dt:#0a56b3;
  --c-E:#ffe7c4; --c-Et:#8f5400;
  --c-S:#e7dcff; --c-St:#5c34bb;
  --c-N:#d3d7e0; --c-Nt:#333a49;
  --c-OFF:#d8f2de; --c-OFFt:#1a7a3a;
  --c-V:#ffd8e1; --c-Vt:#b31f47;
  --warn:#e5484d; --over:#df8500;
  --radius:14px; --radius-sm:9px;
  --shadow:0 1px 2px rgba(0,0,0,.04),0 6px 20px rgba(20,20,40,.05);
  --shadow-sm:0 1px 2px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro","Apple SD Gothic Neo","Malgun Gothic","Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--txt);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
header{background:rgba(255,255,255,.72);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--line);padding:0 22px;display:flex;align-items:center;gap:20px;height:56px;position:sticky;top:0;z-index:50}
header h1{font-size:17px;font-weight:700;letter-spacing:-.02em}
nav{display:flex;gap:2px;background:#ededf0;padding:3px;border-radius:11px}
nav button{border:0;background:none;padding:6px 16px;font-size:13.5px;font-weight:600;color:var(--sub);cursor:pointer;border-radius:8px;transition:color .15s,background .15s}
nav button:hover{color:var(--txt)}
nav button.on{background:var(--card);color:var(--txt);box-shadow:var(--shadow-sm)}
main{padding:20px 22px 60px;max-width:1520px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px;margin-bottom:18px;box-shadow:var(--shadow)}
.row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.spacer{flex:1}
button.btn,label.btn{border:1px solid var(--line-strong);background:var(--card);padding:7px 15px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;color:var(--txt);transition:background .15s,border-color .15s;line-height:1.4;white-space:nowrap}
button.btn:hover,label.btn:hover{background:var(--card-2);border-color:var(--sub)}
button.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
button.btn.primary:hover{background:#0063c8;border-color:#0063c8}
button.btn.danger{color:var(--warn)}
button.btn.danger:hover{background:#fdecec;border-color:var(--warn)}
select,input[type=text],input[type=number]{border:1px solid var(--line-strong);border-radius:8px;padding:7px 11px;font-size:13px;background:var(--card);color:var(--txt);font-family:inherit;transition:border-color .15s,box-shadow .15s}
select:focus,input[type=text]:focus,input[type=number]:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
input[type=number]{width:64px;text-align:center}
:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
.month-nav{display:flex;align-items:center;gap:6px}
.month-nav b{font-size:16px;min-width:120px;text-align:center;font-weight:700;letter-spacing:-.01em}
.hint{color:var(--sub);font-size:12px;line-height:1.6}
h2{font-size:16px;font-weight:700;margin-bottom:12px;letter-spacing:-.01em}
h3{font-size:13px;font-weight:700;margin:16px 0 7px}

/* 브러시 팔레트 */
.palette{display:flex;gap:6px;flex-wrap:wrap}
.palette button{border:2px solid transparent;border-radius:9px;padding:7px 13px;font-weight:700;font-size:13px;cursor:pointer;transition:transform .1s}
.palette button:active{transform:scale(.94)}
.palette button.sel{border-color:var(--txt)}
.pal-D{background:var(--c-D);color:var(--c-Dt)}
.pal-E{background:var(--c-E);color:var(--c-Et)}
.pal-S{background:var(--c-S);color:var(--c-St)}
.pal-N{background:var(--c-N);color:var(--c-Nt)}
.pal-OFF{background:var(--c-OFF);color:var(--c-OFFt)}
.pal-V{background:var(--c-V);color:var(--c-Vt)}
.pal-X{background:#fff;color:var(--sub);border:2px dashed var(--line-strong)!important}
.pal-X.sel{border:2px solid var(--txt)!important}

/* 근무표 그리드 */
.gridwrap{overflow:auto;max-height:70vh;border:1px solid var(--line);border-radius:12px}
table.grid{border-collapse:separate;border-spacing:0;font-size:12px;user-select:none}
table.grid th,table.grid td{border-right:1px solid var(--line);border-bottom:1px solid var(--line);text-align:center;background:var(--card)}
table.grid thead th{position:sticky;top:0;z-index:3;background:#f5f5f7;padding:6px 3px;min-width:34px;font-weight:600;color:var(--sub)}
table.grid thead th.namecol{left:0;z-index:5;color:var(--txt)}
table.grid td.namecol,table.grid th.namecol{position:sticky;left:0;z-index:2;background:var(--card);min-width:96px;max-width:130px;padding:6px 10px;font-weight:600;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-right:2px solid var(--line-strong)}
table.grid td.cell{min-width:34px;height:34px;cursor:pointer;font-weight:700}
table.grid td.cell:hover{outline:2px solid var(--accent);outline-offset:-2px}
table.grid .sun{color:var(--warn)}
table.grid .sat{color:var(--accent)}
td.v-D{background:var(--c-D);color:var(--c-Dt)}
td.v-E{background:var(--c-E);color:var(--c-Et)}
td.v-S{background:var(--c-S);color:var(--c-St)}
td.v-N{background:var(--c-N);color:var(--c-Nt)}
td.v-OFF{background:var(--c-OFF);color:var(--c-OFFt)}
td.v-V{background:var(--c-V);color:var(--c-Vt)}
td.cell.nwarn{box-shadow:inset 0 0 0 2px var(--warn)}
table.grid td.sum{font-weight:600;background:var(--card-2);padding:5px 7px;min-width:38px}
table.grid td.sum.bad{color:var(--warn)}
table.grid td.sum.good{color:var(--c-OFFt)}
table.grid tfoot td{background:#f5f5f7;font-weight:600;padding:5px 2px;color:var(--sub)}
table.grid tfoot td.under{background:#fdecec;color:var(--warn)}
table.grid tfoot td.over{background:#fef1e0;color:var(--over)}
table.grid tfoot td.namecol{background:#f5f5f7;z-index:2;color:var(--txt)}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--sub);margin-top:10px}
.legend span{display:inline-flex;align-items:center;gap:5px}
.legend i{width:14px;height:14px;border-radius:4px;display:inline-block}

/* 경고 목록 */
.warnbox{background:#fdf3f3;border:1px solid #f4cfcf;border-radius:12px;padding:12px 15px;margin-top:12px;font-size:13px;color:#b0282c;line-height:1.8}

/* 휴일계산 */
table.calc{border-collapse:collapse;font-size:13px;width:100%}
table.calc th,table.calc td{border:1px solid var(--line);padding:7px 9px;text-align:center}
table.calc th{background:#f5f5f7;font-weight:600;color:var(--sub)}
table.calc td.neg{color:var(--warn);font-weight:700}
table.calc td.lbl{font-weight:600;background:var(--card-2)}
table.calc input[type=number]{width:56px;padding:4px;border-radius:6px}
table.calc tr.total td{background:#eef5ff;font-weight:700}
.unitcards{display:grid;grid-template-columns:repeat(auto-fill,minmax(460px,1fr));gap:16px}

/* 설정 */
table.set{border-collapse:collapse;font-size:13px}
table.set th,table.set td{border:1px solid var(--line);padding:7px 9px;text-align:center}
table.set th{background:#f5f5f7;color:var(--sub);font-weight:600}
table.set input[type=text]{width:110px}
.stafflist{display:flex;flex-wrap:wrap;gap:7px;margin-top:6px}
.chip{display:inline-flex;align-items:center;gap:6px;background:#f0f0f3;border-radius:18px;padding:5px 7px 5px 13px;font-size:13px;font-weight:600}
.chip button{border:0;background:#d8d8de;border-radius:50%;width:18px;height:18px;line-height:16px;cursor:pointer;font-size:11px;color:var(--sub);transition:background .15s,color .15s}
.chip button:hover{background:var(--warn);color:#fff}
@media print{
  header,.no-print{display:none!important}
  .gridwrap{max-height:none;overflow:visible;border:0}
  body{background:#fff}
  .card{border:0;padding:0;box-shadow:none}
}
</style>
</head>
<body>
<header>
  <h1>요양보호사 근무표</h1>
  <nav>
    <button data-tab="roster" class="on">근무표</button>
    <button data-tab="calc">휴일계산</button>
    <button data-tab="pay">급여</button>
    <button data-tab="settings">설정</button>
  </nav>
  <div class="spacer"></div>
  <span class="hint" id="saveState">자동저장</span>
</header>
<main>
  <section id="tab-roster"></section>
  <section id="tab-calc" style="display:none"></section>
  <section id="tab-pay" style="display:none"></section>
  <section id="tab-settings" style="display:none"></section>
</main>
<script>
'use strict';
/* ===== 데이터 ===== */
const LS_KEY='care_schedule_v1';
const SHIFT_CODES=['D','E','S','N','OFF','V'];
const DEFAULTS={
  shifts:{
    D:{label:'주간',hours:8},
    E:{label:'이브닝',hours:8},
    S:{label:'스윙',hours:8},
    N:{label:'야간',hours:8},
    OFF:{label:'OFF',hours:0},
    V:{label:'연차',hours:0}
  },
  units:[
    {id:'u1',name:'기쁨',need:{D:2,E:2,S:2,N:2}},
    {id:'u2',name:'희망',need:{D:3,E:2,S:1,N:2}},
    {id:'u3',name:'소망',need:{D:3,E:2,S:2,N:2}},
    {id:'u4',name:'미소',need:{D:2,E:2,S:0,N:2}},
    {id:'u5',name:'2층',need:{D:1,E:1,S:1,N:1}}
  ],
  staff:[],
  // 2026 엑셀 값 기본 입력: 월별 공휴일 수 / 오프수
  holidays:{ '2026':[10,11,10,8,12,9,9,11,10,11,9,9] },
  offs:{ '2026':[9,9,9,8,9,9,9,10,9,9,9,9] },
  roster:{},
  payCfg:{nightH:4}, // 야간 1회당 가산 환산시간 (8시간×0.5배 기준)
  afCfg:{mode:'cycle',nAfterOff:true,noDafterNOFF:false,maxRun:4,pattern:'ESDNFF',v3:true,v5:true}, // 편성 방식·규칙 (저장됨)
  ui:{ym:'2026-07',unitId:'u1',calcYear:'2026'}
};
/* 대한민국 법정공휴일+대체공휴일 (근로자의날·제헌절 제외 — 기존 엑셀 집계 기준과 동일)
   2028-04-12는 국회의원 선거일. 이후 선거일·임시공휴일이 생기면 표에서 직접 고치면 됩니다 */
const KR_HOLIDAYS={
  2026:['1-1','2-16','2-17','2-18','3-1','3-2','5-5','5-24','5-25','6-3','6-6','8-15','8-17','9-24','9-25','9-26','10-3','10-5','10-9','12-25'],
  2027:['1-1','2-6','2-7','2-8','2-9','3-1','5-5','5-13','6-6','8-15','8-16','9-14','9-15','9-16','10-3','10-4','10-9','10-11','12-25','12-27'],
  2028:['1-1','1-26','1-27','1-28','3-1','4-12','5-2','5-5','6-6','8-15','10-2','10-3','10-4','10-5','10-9','12-25'],
  2029:['1-1','2-12','2-13','2-14','3-1','5-5','5-7','5-20','5-21','6-6','8-15','9-21','9-22','9-23','9-24','10-3','10-9','12-25'],
  2030:['1-1','2-2','2-3','2-4','2-5','3-1','5-5','5-6','5-9','6-6','8-15','9-11','9-12','9-13','10-3','10-9','12-25']
};
function autoHolidayCounts(y){
  const list=new Set(KR_HOLIDAYS[y]||[]);
  const out=[];
  for(let m=1;m<=12;m++){
    let c=0;
    const nd=new Date(y,m,0).getDate();
    for(let d=1;d<=nd;d++){
      const w=new Date(y,m-1,d).getDay();
      if(w===0||w===6||list.has(m+'-'+d))c++;
    }
    out.push(c);
  }
  return out;
}
let S=load();
function load(){
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(!raw) return structuredClone(DEFAULTS);
    const d=JSON.parse(raw);
    for(const k of Object.keys(DEFAULTS)) if(d[k]===undefined) d[k]=structuredClone(DEFAULTS[k]);
    if(!d.afCfg.v3){d.afCfg={nAfterOff:true,noDafterNOFF:true,pattern:d.afCfg.pattern||'ESDNF',v3:true};} // 규칙 재정의 (2026-07 요청: N→OFF 무조건, N,OFF 뒤 D금지)
    if(d.afCfg.maxRun===undefined)d.afCfg.maxRun=4; // 5일 연속 근무 금지 (2026-07 요청)
    if(!d.afCfg.mode){d.afCfg.mode='cycle';if(d.afCfg.pattern==='ESDNF')d.afCfg.pattern='ESDNFF';} // 순환 편성 기본 (2026-07 기준표 요청)
    if(!d.afCfg.v5){d.afCfg.noDafterNOFF=false;d.afCfg.v5=true;} // N→OFF→D 금지 규칙 삭제 (2026-07 사용자 요청)
    return d;
  }catch(e){ return structuredClone(DEFAULTS); }
}
let saveTimer=null;
function save(){
  const el=document.getElementById('saveState');
  try{
    localStorage.setItem(LS_KEY,JSON.stringify(S));
    el.textContent='저장됨 '+new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  }catch(e){
    el.textContent='저장 안 됨 — 백업 파일로 보관하세요';
    el.style.color='var(--warn)';
    return;
  }
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{el.textContent='자동저장';},2000);
}
const uid=()=> 'x'+Math.random().toString(36).slice(2,9);
const esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

/* ===== 공통 ===== */
const WD=['일','월','화','수','목','금','토'];
function ymParts(ym){const[a,b]=ym.split('-');return[+a,+b];}
function daysIn(y,m){return new Date(y,m,0).getDate();}
function shiftYm(ym,delta){const[y,m]=ymParts(ym);const d=new Date(y,m-1+delta,1);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function unitById(id){return S.units.find(u=>u.id===id);}
function unitStaff(unitId){return S.staff.filter(p=>p.unitId===unitId);}
function getCell(ym,pid,day){return (S.roster[ym]&&S.roster[ym][pid]&&S.roster[ym][pid][day])||'';}
function setCell(ym,pid,day,val){
  if(!S.roster[ym])S.roster[ym]={};
  if(!S.roster[ym][pid])S.roster[ym][pid]={};
  if(val)S.roster[ym][pid][day]=val; else delete S.roster[ym][pid][day];
}

/* ===== 탭 전환 ===== */
document.querySelectorAll('nav button').forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll('nav button').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    ['roster','calc','pay','settings'].forEach(t=>{
      document.getElementById('tab-'+t).style.display=(t===b.dataset.tab)?'':'none';
    });
    render();
  };
});
function activeTab(){return document.querySelector('nav button.on').dataset.tab;}

/* ===== 자동 편성 ===== */
function autoFill(opts){
  // opts: {ym, unitId, need:{D,E,S,N}, off, vac, nightRule}
  const [y,m]=ymParts(opts.ym), nd=daysIn(y,m);
  const people=unitStaff(opts.unitId);
  const n=people.length;
  if(!n) return {error:'이 유닛에 직원이 없습니다.'};
  /* 미리 찍어둔 연차는 그대로 두고 그 날을 피해서 편성 */
  const preset={};
  for(const p of people){
    const cur=(S.roster[opts.ym]||{})[p.id]||{};
    preset[p.id]=new Set(Object.keys(cur).filter(d=>cur[d]==='V').map(Number));
  }
  const vacOf=p=>preset[p.id].size; // 연차는 입력한 날짜만 (자동배정 없음)
  const restOf=p=>opts.off+vacOf(p);
  for(const p of people)if(restOf(p)>=nd)return {error:p.name+': OFF와 연차 합이 그 달 일수 이상입니다.'};
  const baseNeed=['D','E','S','N'].reduce((a,c)=>a+(opts.need[c]||0),0);
  const capacity=people.reduce((a,p)=>a+nd-restOf(p),0);
  const surplus=capacity-baseNeed*nd;

  /* 전월 마지막 이틀을 0·-1일로 이어붙여 월 경계 연속성 반영 (N으로 끝났으면 1일은 강제 OFF) */
  const prevYm=shiftYm(opts.ym,-1);
  const prevRoster=S.roster[prevYm]||{};
  const [py,pm]=ymParts(prevYm), ndPrev=daysIn(py,pm);

  const isWorkCode=v=>v==='D'||v==='E'||v==='S'||v==='N';
  const grid={}, restLeft={}, nStreak={}, wStreak={}, counts={};
  for(const p of people){
    grid[p.id]={};restLeft[p.id]=restOf(p);counts[p.id]={D:0,E:0,S:0,N:0};
    const pr=prevRoster[p.id]||{};
    grid[p.id][0]=pr[ndPrev]||''; grid[p.id][-1]=pr[ndPrev-1]||'';
    nStreak[p.id]=(grid[p.id][0]==='N')?1:0;
    // 전월 말 연속 근무일수 이월 (최대 10일까지 역추적)
    let ws=0;
    for(let k=0;k<10;k++){const v=pr[ndPrev-k];if(isWorkCode(v))ws++;else break;}
    wStreak[p.id]=ws;
  }
  let restSlotsLeft=people.reduce((a,p)=>a+restOf(p),0);
  const shortage={}; let extraS=0;
  const presetLeft=p=>[...preset[p.id]].filter(x=>x>curDay).length; // 오늘 이후 남은 지정연차
  let curDay=0;
  /* 선호 패턴 (예: ESDNF = E→S→D→N→휴무 순환): 오늘 근무의 "패턴상 전날 근무"가 어제와 일치하는 사람 우선 */
  const predOf={};
  const pat=(opts.pattern||'');
  if(pat.length>=2)for(let i=0;i<pat.length;i++)predOf[pat[i]]=pat[(i-1+pat.length)%pat.length];
  const isRest=v=>v==='OFF'||v==='V';
  const patScore=(p,code,d)=>{ // 0=패턴 일치, 1=불일치/판단불가
    const pr=predOf[code];if(!pr||d<1)return 1;
    const g=grid[p.id][d-1];
    return (pr==='F'?isRest(g):g===pr)?0:1;
  };

  for(let d=1;d<=nd;d++){
    curDay=d;
    const daysLeft=nd-d+1;
    /* 쉬는 사람 고르기: ①지정 연차 ②야간(N) 다음날 강제 OFF ③남은 휴무를 남은 일수에 다 써야 하는 사람 ④휴무 비율 높은 순 */
    const resters=new Set();
    for(const p of people){
      if(preset[p.id].has(d)){resters.add(p.id);continue;}
      if(opts.nAfterOff&&nStreak[p.id]>=1){resters.add(p.id);continue;} // N 다음날 무조건 OFF
      if(restLeft[p.id]-presetLeft(p)<=0)continue;
      if(opts.maxRun&&wStreak[p.id]>=opts.maxRun){resters.add(p.id);continue;} // 연속 근무 한도 도달 → 강제 휴무
      if(restLeft[p.id]>=daysLeft)resters.add(p.id);
    }
    let target=Math.round(restSlotsLeft/daysLeft);
    target=Math.max(target,resters.size);
    const cands=people.filter(p=>!resters.has(p.id)&&restLeft[p.id]-presetLeft(p)>0)
      .sort((a,b)=>patScore(a,'F',d)-patScore(b,'F',d) // 패턴상 오늘 쉴 차례인 사람 우선
        ||wStreak[b.id]-wStreak[a.id] // 연속 근무가 긴 사람 먼저 쉬게
        ||restLeft[b.id]/daysLeft-restLeft[a.id]/daysLeft
        ||((people.indexOf(a)+d)%n)-((people.indexOf(b)+d)%n));
    for(const p of cands){if(resters.size>=target)break;resters.add(p.id);}

    /* 근무 배정 */
    const workers=people.filter(p=>!resters.has(p.id));
    const assigned={};
    const slots={N:opts.need.N||0,S:opts.need.S||0,E:opts.need.E||0,D:opts.need.D||0};
    for(const p of workers){ // 고정 근무 직원
      if(!assigned[p.id]&&p.fix){assigned[p.id]=p.fix;slots[p.fix]--;}
    }
    /* N → OFF → 바로 D 금지: 어제 쉬었고 그제가 야간이던 사람은 오늘 D 불가 (전월 경계 포함) */
    const noD=new Set();
    if(opts.noDafterNOFF)for(const p of workers){
      const g=grid[p.id];
      if((g[d-1]==='OFF'||g[d-1]==='V')&&g[d-2]==='N')noD.add(p.id);
    }
    for(const code of ['N','S','E','D']){ // 같은 근무 횟수가 적은 사람부터
      while(slots[code]>0){
        const pool=workers.filter(p=>!assigned[p.id]&&!(code==='D'&&noD.has(p.id)));
        if(!pool.length){shortage[d]=(shortage[d]||[]);shortage[d].push(code+' '+slots[code]+'명');break;}
        const spare=p=>restLeft[p.id]-presetLeft(p)>0?0:1; // 야간 뒤에 쉴 여유가 있는가
        const totalW=p=>counts[p.id].D+counts[p.id].E+counts[p.id].S+counts[p.id].N;
        if(code==='N'){
          /* N은 골고루: 그제도 N이던 사람(N OFF N 반복)은 후순위, N 횟수 적은 사람 우선 */
          pool.sort((a,b)=>spare(a)-spare(b)
            ||(grid[a.id][d-2]==='N'?1:0)-(grid[b.id][d-2]==='N'?1:0)
            ||counts[a.id].N-counts[b.id].N
            ||patScore(a,code,d)-patScore(b,code,d)
            ||totalW(a)-totalW(b));
        }else{
          pool.sort((a,b)=>
            (code!=='D'?(noD.has(b.id)?1:0)-(noD.has(a.id)?1:0):0) // D 못 서는 사람을 E/S에 먼저 배치해 D 자리 확보
            ||patScore(a,code,d)-patScore(b,code,d) // 선호 패턴 순서에 맞는 사람 우선
            ||counts[a.id][code]-counts[b.id][code]
            ||totalW(a)-totalW(b));
        }
        assigned[pool[0].id]=code;slots[code]--;
      }
    }
    for(const p of workers)if(!assigned[p.id]){assigned[p.id]='S';extraS++;} // 여유 인력은 S 추가(깍두기)

    for(const p of people){
      if(resters.has(p.id)){restLeft[p.id]--;restSlotsLeft--;nStreak[p.id]=0;wStreak[p.id]=0;grid[p.id][d]=preset[p.id].has(d)?'V':'OFF';}
      else{const c=assigned[p.id];grid[p.id][d]=c;counts[p.id][c]++;nStreak[p.id]=c==='N'?nStreak[p.id]+1:0;wStreak[p.id]++;}
    }
  }
  /* 결과 반영 (경계용 0·-1일 제외, 1~말일만 저장) */
  for(const p of people){
    if(!S.roster[opts.ym])S.roster[opts.ym]={};
    const clean={};
    for(let d=1;d<=nd;d++)if(grid[p.id][d])clean[d]=grid[p.id][d];
    S.roster[opts.ym][p.id]=clean;
  }
  return {shortage,extraS,surplus,capacity,need:baseNeed*nd};
}

/* ===== 순환 편성: 패턴(예: ESDNFF)을 전원이 하루씩 어긋나게 그대로 반복 =====
   날짜 기준 절대 위상이라 달이 바뀌어도 주기가 자동으로 이어진다 */
function cyclicFill(opts){
  const [y,m]=ymParts(opts.ym), nd=daysIn(y,m);
  const people=unitStaff(opts.unitId);
  const n=people.length;
  if(!n)return {error:'이 유닛에 직원이 없습니다.'};
  const cyc=opts.pattern||'ESDNFF';
  const len=cyc.length;
  if(len<2||!cyc.includes('F'))return {error:'패턴에 근무와 F(휴무)가 같이 있어야 합니다. 예: E S D N F F'};
  const isWorkCode=v=>v==='D'||v==='E'||v==='S'||v==='N';
  const prevYm=shiftYm(opts.ym,-1);
  const prevRoster=S.roster[prevYm]||{};
  const [py,pm]=ymParts(prevYm), ndPrev=daysIn(py,pm);
  const notes=[];

  /* 지정 연차 수집 */
  const preset={};
  for(const p of people){
    const cur=(S.roster[opts.ym]||{})[p.id]||{};
    preset[p.id]=new Set(Object.keys(cur).filter(d=>cur[d]==='V').map(Number));
  }
  /* 1) 기본 순환 격자 */
  const epoch=d=>Math.floor(Date.UTC(y,m-1,d)/864e5);
  const grid={};
  people.forEach((p,i)=>{
    grid[p.id]={};
    for(let d=1;d<=nd;d++){
      const c=cyc[(((epoch(d)+i)%len)+len)%len];
      grid[p.id][d]=c==='F'?'OFF':c;
    }
    if(p.fix)for(let d=1;d<=nd;d++)if(grid[p.id][d]!=='OFF')grid[p.id][d]=p.fix; // 고정 근무 직원
  });
  /* 규칙 검사 헬퍼 (전월 경계 포함) */
  const val=(p,d)=> d>=1 ? (grid[p.id][d]||'') : ((prevRoster[p.id]||{})[ndPrev+d]||'');
  const runAround=(p,d)=>{ // d를 근무로 가정했을 때 연속 근무 길이
    let r=1;
    for(let k=d-1;k>=d-12;k--){if(isWorkCode(val(p,k)))r++;else break;}
    for(let k=d+1;k<=Math.min(nd,d+12);k++){if(isWorkCode(val(p,k)))r++;else break;}
    return r;
  };
  const canWork=(p,d,code,skipRun)=>{
    if(opts.nAfterOff&&val(p,d-1)==='N')return false;                       // N 다음날은 OFF
    if(opts.nAfterOff&&code==='N'&&d<nd&&isWorkCode(val(p,d+1)))return false; // N이면 다음날 쉬어야
    if(opts.noDafterNOFF&&code==='D'&&(val(p,d-1)==='OFF'||val(p,d-1)==='V')&&val(p,d-2)==='N')return false;
    if(!skipRun&&opts.maxRun&&runAround(p,d)>opts.maxRun)return false;
    return true;
  };
  /* 2) 지정 연차: 휴무일이면 그대로 연차, 근무일이면 그날 OFF인 사람과 맞바꿈 */
  for(const p of people){
    for(const d of [...preset[p.id]].sort((a,b)=>a-b)){
      if(d<1||d>nd)continue;
      const orig=grid[p.id][d];
      grid[p.id][d]='V';
      if(orig==='OFF'||orig==='V')continue;
      const sub=people.filter(q=>q!==p&&grid[q.id][d]==='OFF'&&!preset[q.id].has(d)&&canWork(q,d,orig))
        .sort((a,b)=>{ // OFF가 많이 남을 사람부터 대신 서게
          const rest=x=>Object.values(grid[x.id]).filter(v=>v==='OFF').length;
          return rest(b)-rest(a);
        })[0];
      if(sub){grid[sub.id][d]=orig;continue;}
      /* 직접 대체가 안 되면: 그날 근무자와 역할을 바꾸고, 그 사람의 원래 근무를 휴무자가 메꿈 */
      let done=false;
      outer:
      for(const w of people){
        if(w===p||preset[w.id].has(d))continue;
        const wc=grid[w.id][d];
        if(!isWorkCode(wc)||wc===orig)continue;
        if(!canWork(w,d,orig,true))continue; // w는 이미 근무 중이라 연속일수 불변
        for(const q of people){
          if(q===p||q===w||grid[q.id][d]!=='OFF'||preset[q.id].has(d))continue;
          if(!canWork(q,d,wc))continue;
          grid[w.id][d]=orig;grid[q.id][d]=wc;done=true;break outer;
        }
      }
      if(!done)notes.push(`${d}일: ${esc(p.name)} 연차 자리(${orig})를 규칙(야간·연속제한) 안에서 대신할 사람이 없습니다 — 그날은 손으로 조정해 주세요`);
    }
  }
  /* 3) OFF 초과분을 S로 전환해 오프수 맞춤 (기준표의 "S 2명인 날") */
  let extraS=0;
  for(const p of people){
    const offDays=()=>Object.keys(grid[p.id]).map(Number).filter(d=>grid[p.id][d]==='OFF');
    let excess=offDays().length-opts.off;
    if(excess<0){notes.push(`${esc(p.name)}: OFF ${offDays().length}개 (목표 ${opts.off}개보다 적음)`);continue;}
    while(excess>0){
      const sCount=d=>people.filter(q=>grid[q.id][d]==='S').length;
      const cand=offDays().filter(d=>canWork(p,d,'S'))
        .sort((a,b)=>sCount(a)-sCount(b)||a-b)[0]; // S가 적은 날부터 고르게
      if(cand===undefined){notes.push(`${esc(p.name)}: 규칙 때문에 OFF ${excess}개를 근무로 못 바꿨습니다`);break;}
      grid[p.id][cand]='S';extraS++;excess--;
    }
  }
  /* 결과 저장 + 요약 */
  for(const p of people){
    if(!S.roster[opts.ym])S.roster[opts.ym]={};
    const clean={};
    for(let d=1;d<=nd;d++)if(grid[p.id][d])clean[d]=grid[p.id][d];
    S.roster[opts.ym][p.id]=clean;
  }
  const shortage={};
  for(let d=1;d<=nd;d++){
    for(const c of ['D','E','S','N']){
      const have=people.filter(p=>grid[p.id][d]===c).length, need=opts.need[c]||0;
      if(have<need){shortage[d]=shortage[d]||[];shortage[d].push(c+' '+(need-have)+'명');}
    }
  }
  const baseNeed=['D','E','S','N'].reduce((a,c)=>a+(opts.need[c]||0),0);
  return {shortage,extraS,notes,cycle:cyc,capacity:n*nd-people.reduce((a,p)=>a+Object.values(grid[p.id]).filter(v=>v==='OFF'||v==='V').length,0),need:baseNeed*nd,surplus:0};
}

    html+=`<div style="margin-top:12px;padding:12px;background:#f7f9fc;border:1px solid var(--line);border-radius:10px">

      <b>하루 필요인원</b>
      ${['D','E','S','N'].map(c=>`<label>${c} <input type="number" min="0" max="20" id="af-${c}" value="${unit?unit.need[c]||0:0}"></label>`).join('')}
      <label>OFF <input type="number" min="0" max="20" id="af-off" value="${offDefault}"></label>
      <span class="hint">D·E·N·OFF는 고정 기준, 남는 인력은 전부 S로 들어갑니다</span>
      <button class="btn primary" id="afRun">편성 실행</button>
    </div>
    <div class="row" style="margin-top:8px">
      <b style="font-size:13px">방식</b>
      <label><input type="radio" name="af-mode" value="cycle" ${S.afCfg.mode!=='greedy'?'checked':''}> 순환 <span class="hint">패턴을 전원이 하루씩 어긋나게 그대로 반복 (기준표 방식)</span></label>
      <label><input type="radio" name="af-mode" value="greedy" ${S.afCfg.mode==='greedy'?'checked':''}> 자동 <span class="hint">매일 필요인원에 맞춰 채움</span></label>
    </div>
    <div class="row" style="margin-top:8px">
      <b style="font-size:13px">편성 규칙</b>
      <label><input type="checkbox" id="af-nafteroff" ${S.afCfg.nAfterOff?'checked':''}> N &rarr; OFF</label>
      <label>연속 근무 최대 <input type="number" id="af-maxrun" min="0" max="10" value="${S.afCfg.maxRun??4}" style="width:52px">일 <span class="hint">(4 또는 5 권장, 0 = 제한 없음)</span></label>
      <label>패턴 <select id="af-pat">
        <option value="ESDNFF" ${S.afCfg.pattern!=='ESDNF'?'selected':''}>E S D N F F</option>
        <option value="ESDNF" ${S.afCfg.pattern==='ESDNF'?'selected':''}>E S D N F</option>
      </select></label>
      <span class="hint">F = 휴무. 전월 마지막 날도 이어서 봅니다 (전월 말일이 N이면 1일은 OFF).</span>
    </div>
    <div style="margin-top:10px"><b style="font-size:13px">직원별 연차일</b>
      <button class="btn" id="afClearV" style="padding:3px 10px;font-size:12px;margin-left:6px">연차 전부 지우기</button>
      <span class="hint">여러 날은 쉼표(5, 12), 연속은 붙임표(12-14 = 12·13·14일). 적은 날짜에만 연차가 들어가고 그날을 피해서 짭니다. 비워두면 그 사람은 연차 없이 편성됩니다.</span>
      <div class="row" style="margin-top:6px;gap:8px">
      ${(unit?unitStaff(unit.id):[]).map(p=>{
        const cur=(S.roster[ym]&&S.roster[ym][p.id])||{};
        const vdays=Object.keys(cur).filter(d=>cur[d]==='V').map(Number).sort((a,b)=>a-b).join(', ');

      ${SHIFT_CODES.map(c=>`<button class="pal-${c} ${brush===c?'sel':''}" data-b="${c}">${c==='V'?'연차':c}</button>`).join('')}

    root.innerHTML=html; bindRosterTop(); return;
  }

  /* 그리드 */
  html+=`<div class="card"><div class="gridwrap"><table class="grid"><thead><tr><th class="namecol">${esc(unit.name)} (${people.length}명)</th>`;
  for(let d=1;d<=nd;d++){
    const w=new Date(y,m-1,d).getDay();
    html+=`<th class="${w===0?'sun':w===6?'sat':''}">${d}<br><span style="font-weight:400">${WD[w]}</span></th>`;
  }
  html+=`<th>D</th><th>E</th><th>S</th><th>N</th><th>OFF</th><th>연차</th><th>근무</th>`;
  html+=`</tr></thead><tbody>`;

  const warns=[];
  // 전월 말일 이월용: day<=0이면 전월의 (말일+day)로 조회
  const prevYm=shiftYm(ym,-1),[ppy,ppm]=ymParts(prevYm),ndPrev=daysIn(ppy,ppm);
  const cellRel=(pid,day)=> day>=1 ? getCell(ym,pid,day) : getCell(prevYm,pid,ndPrev+day);
  const maxRun=S.afCfg.maxRun??0;
  for(const p of people){
    html+=`<tr><td class="namecol">${esc(p.name)}${p.fix?` <span style="color:var(--sub);font-weight:400;font-size:11px">${p.fix}고정</span>`:''}</td>`;
    const cnt={D:0,E:0,S:0,N:0,OFF:0,V:0};
    // 전월 말 연속 근무 이월
    let run=0;
    for(let k=0;k<10;k++){const pv=cellRel(p.id,-k);if(pv==='D'||pv==='E'||pv==='S'||pv==='N')run++;else break;}
    for(let d=1;d<=nd;d++){
      const v=getCell(ym,p.id,d);
      if(v)cnt[v]++;
      // 규칙 위반 경고 (전월 말일 이월 포함): N 다음은 OFF, N·OFF 뒤 D 금지
      let nw='';
      const prev=cellRel(p.id,d-1), prev2=cellRel(p.id,d-2);
      const isWork=x=>x==='D'||x==='E'||x==='S'||x==='N';
      if(prev==='N'&&isWork(v)){
        nw='nwarn';
        warns.push(`${p.name}: ${d}일 — N 다음날은 OFF여야 하는데 ${v} 배정`);
      }
      run=isWork(v)?run+1:0;
      if(maxRun>0&&run>maxRun){
        nw='nwarn';
        if(run===maxRun+1)warns.push(`${p.name}: ${d}일 — ${maxRun+1}일 연속 근무 (최대 ${maxRun}일)`);
      }
      html+=`<td class="cell ${v?'v-'+v:''} ${nw}" data-p="${p.id}" data-d="${d}">${v==='V'?'연':v}</td>`;
    }
    const workDays=cnt.D+cnt.E+cnt.S+cnt.N;
    const offCls=offTarget===undefined?'':(cnt.OFF===offTarget?'good':'bad');
    html+=`<td class="sum">${cnt.D}</td><td class="sum">${cnt.E}</td><td class="sum">${cnt.S}</td><td class="sum">${cnt.N}</td>
      <td class="sum ${offCls}" title="목표 오프수 ${offTarget??'-'}개">${cnt.OFF}${offTarget!==undefined?'/'+offTarget:''}</td>
      <td class="sum">${cnt.V||''}</td><td class="sum">${workDays}</td></tr>`;
  }
  html+=`</tbody><tfoot>`;
  const dayCount=(d,fn)=>{let c=0;for(const p of people){const v=getCell(ym,p.id,d);if(fn(v))c++;}return c;};
  /* 근무인원 합계 줄 */
  html+=`<tr><td class="namecol">근무인원</td>`;
  for(let d=1;d<=nd;d++)html+=`<td>${dayCount(d,v=>v==='D'||v==='E'||v==='S'||v==='N')}</td>`;
  html+=`<td colspan="7"></td></tr>`;
  /* 근무별 합계: D·E·N은 고정 인원 기준 색 표시, S는 남는 인력이 들어가는 자리 */
  for(const code of ['D','E','S','N']){
    const need=unit.need[code]||0;
    html+=`<tr><td class="namecol">${code} 합계 (기준 ${need})</td>`;
    for(let d=1;d<=nd;d++){
      const c=dayCount(d,v=>v===code);
      const cls=c<need?'under':c>need?'over':'';
      html+=`<td class="${cls}">${c}</td>`;
    }
    html+=`<td colspan="7"></td></tr>`;
  }
  for(const [label,fn] of [['OFF 합계',v=>v==='OFF'],['연차 합계',v=>v==='V']]){
    html+=`<tr><td class="namecol">${label}</td>`;
    for(let d=1;d<=nd;d++){const c=dayCount(d,fn);html+=`<td>${c||''}</td>`;}
    html+=`<td colspan="7"></td></tr>`;
  }
  html+=`</tfoot></table></div>`;
  html+=`<div class="legend">
    <span><i style="background:var(--c-D)"></i>D</span>
    <span><i style="background:var(--c-E)"></i>E</span>
    <span><i style="background:var(--c-S)"></i>S</span>
    <span><i style="background:var(--c-N)"></i>N</span>
    <span><i style="background:var(--c-OFF)"></i>OFF</span>
    <span><i style="background:var(--c-V)"></i>연차</span>
    <span>아래 합계: 빨강=필요인원 미달, 주황=초과</span>
  </div>`;
  if(warns.length){
    html+=`<div class="warnbox"><b>확인 필요 ${warns.length}건</b><br>${warns.map(esc).join('<br>')}</div>`;
  }
  if(genResult){
    const sh=Object.entries(genResult.shortage||{});
    if(genResult.error){
      html+=`<div class="warnbox">편성 실패: ${esc(genResult.error)}</div>`;
    }else{
      html+=`<div class="warnbox" style="background:#f0f9f1;border-color:#b7dfc0;color:#1e7a3c">
      <b>편성 완료${genResult.cycle?` — 순환 (${genResult.cycle.split('').join(' ')})`:''}</b> — 가용 ${genResult.capacity}명-일 / 필요 ${genResult.need}명-일
      ${genResult.extraS?` (S 추가 근무 ${genResult.extraS}건)`:''}
      ${sh.length?`<br><span style="color:var(--warn)">부족한 날: ${sh.map(([d,v])=>d+'일('+v.join(',')+')').join(', ')}</span>`:'<br>모든 날짜 필요인원 충족'}
      ${genResult.notes&&genResult.notes.length?`<br><span style="color:var(--over)">${genResult.notes.join('<br>')}</span>`:''}
      </div>`;
    }
  }
  html+=`</div>`;
  root.innerHTML=html;
  bindRosterTop();

  /* 셀 페인팅 */
  root.querySelectorAll('td.cell').forEach(td=>{
    td.addEventListener('mousedown',e=>{
      e.preventDefault();painting=true;paint(td);
      // 페인팅이 끝나는 mouseup에만 합계 재계산 (일반 버튼 클릭까지 재렌더로 씹히면 안 됨)
      document.addEventListener('mouseup',()=>{
        if(activeTab()==='roster')render();
      },{once:true});
    });
    td.addEventListener('mouseover',()=>{if(painting)paint(td);});
  });
  function paint(td){
    setCell(ym,td.dataset.p,+td.dataset.d,brush);
    save();
    // 드래그 중 전체 재렌더는 무겁고 포커스가 튐 → 칸만 즉시 갱신, 합계는 mouseup에서
    td.className='cell '+(brush?'v-'+brush:'');
    td.dataset.p&&(td.textContent=brush==='V'?'연':brush);
  }
}
function bindRosterTop(){
  const root=document.getElementById('tab-roster');
  root.querySelector('#prevM').onclick=()=>{S.ui.ym=shiftYm(S.ui.ym,-1);genResult=null;save();render();};
  root.querySelector('#nextM').onclick=()=>{S.ui.ym=shiftYm(S.ui.ym,1);genResult=null;save();render();};
  root.querySelector('#unitSel').onchange=e=>{S.ui.unitId=e.target.value;genResult=null;save();render();};
  root.querySelector('#autoBtn').onclick=()=>{autoOpen=!autoOpen;render();};
  const afClearV=root.querySelector('#afClearV');
  if(afClearV)afClearV.onclick=()=>{
    if(!confirm('이 유닛의 이번 달 연차 표시를 전부 지웁니다. (근무 배정은 그대로) 계속할까요?'))return;
    const cur=S.roster[S.ui.ym]||{};
    for(const p of unitStaff(S.ui.unitId)){
      const g=cur[p.id];if(!g)continue;
      for(const d of Object.keys(g))if(g[d]==='V')delete g[d];
    }
    save();render();
  };
  const afRun=root.querySelector('#afRun');
  if(afRun)afRun.onclick=()=>{
    const cur=S.roster[S.ui.ym];
    const people=unitStaff(S.ui.unitId);
    const hasData=cur&&people.some(p=>cur[p.id]&&Object.keys(cur[p.id]).length);
    if(hasData&&!confirm('이 유닛의 이번 달 배정을 새로 편성합니다. 지정한 연차일은 그대로 유지됩니다. 계속할까요?'))return;
    /* 입력칸의 연차일을 먼저 반영 (기존 연차 표시는 입력값으로 교체) */
    const[gy,gm]=ymParts(S.ui.ym), gnd=daysIn(gy,gm);
    for(const p of people){
      const inp=root.querySelector(`input[data-vdays="${p.id}"]`);
      if(!inp)continue;
      const days=new Set();
      for(const tok of inp.value.split(/[,\s]+/)){
        const range=tok.match(/^(\d+)\s*[-~]\s*(\d+)$/); // "12-14" 또는 "12~14" = 연속 연차
        if(range){
          for(let d=+range[1];d<=Math.min(+range[2],gnd);d++)if(d>=1)days.add(d);
        }else{
          const d=parseInt(tok,10);
          if(d>=1&&d<=gnd)days.add(d);
        }
      }
      const curP=(S.roster[S.ui.ym]||{})[p.id]||{};
      for(const d of Object.keys(curP))if(curP[d]==='V')setCell(S.ui.ym,p.id,+d,'');
      for(const d of days)setCell(S.ui.ym,p.id,d,'V');
    }
    const opts={
      ym:S.ui.ym, unitId:S.ui.unitId,
      need:{D:+root.querySelector('#af-D').value||0, E:+root.querySelector('#af-E').value||0,
            S:+root.querySelector('#af-S').value||0, N:+root.querySelector('#af-N').value||0},
      off:+root.querySelector('#af-off').value||0,
      nAfterOff:root.querySelector('#af-nafteroff').checked,
      noDafterNOFF:false, // 규칙 삭제됨 (2026-07 사용자 요청)
      maxRun:Math.max(0,+root.querySelector('#af-maxrun').value||0),
      pattern:root.querySelector('#af-pat').value.toUpperCase().replace(/[^DESNF]/g,'')
    };
    const mode=root.querySelector('input[name="af-mode"]:checked').value;
    S.afCfg={mode,nAfterOff:opts.nAfterOff,noDafterNOFF:false,maxRun:opts.maxRun,pattern:opts.pattern,v3:true,v5:true};
    genResult=mode==='cycle'?cyclicFill(opts):autoFill(opts);
    if(!genResult.error)save();
    render();
  };
  root.querySelector('#printBtn').onclick=()=>window.print();
  root.querySelector('#xlsBtn').onclick=()=>exportXls();
  root.querySelector('#xlsIn').onchange=e=>{const f=e.target.files[0];if(f){importXls(f);e.target.value='';}};
  root.querySelector('#copyPrev').onclick=()=>{
    const prev=shiftYm(S.ui.ym,-1);
    const src=S.roster[prev];
    if(!src||Object.keys(src).length===0){alert(prev+' 데이터가 없습니다.');return;}
    const[y,m]=ymParts(S.ui.ym);
    const nd=daysIn(y,m);
    const people=unitStaff(S.ui.unitId);
    const cur=S.roster[S.ui.ym];
    const hasData=cur&&people.some(p=>cur[p.id]&&Object.keys(cur[p.id]).length);
    if(hasData&&!confirm('이번 달에 이미 배정이 있습니다. 이 유닛만 전월 내용으로 덮어쓸까요?'))return;
    for(const p of people){
      if(!src[p.id])continue;
      for(let d=1;d<=nd;d++) setCell(S.ui.ym,p.id,d,src[p.id][d]||'');
    }
    save();render();
  };
  root.querySelector('#clearM').onclick=()=>{
    const unit=unitById(S.ui.unitId);
    if(!confirm(`${S.ui.ym} 「${unit.name}」 유닛의 배정을 모두 지울까요?`))return;
    const cur=S.roster[S.ui.ym];
    if(cur) for(const p of unitStaff(S.ui.unitId)) delete cur[p.id];
    save();render();
  };
  const pal=root.querySelector('#palette');
  if(pal)pal.querySelectorAll('button').forEach(b=>{
    b.onclick=()=>{brush=b.dataset.b;pal.querySelectorAll('button').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');};
  });
}

/* ===== 엑셀 내보내기 (엑셀이 읽는 HTML .xls — 기존 엑셀 표와 같은 모양·색) ===== */
function exportXls(){
  const ym=S.ui.ym,[y,m]=ymParts(ym),nd=daysIn(y,m);
  const unit=unitById(S.ui.unitId);
  const people=unit?unitStaff(unit.id):[];
  if(!people.length){alert('내보낼 직원이 없습니다.');return;}
  const COLORS={D:'#d7e9ff',E:'#ffe9cc',S:'#e5dcff',N:'#d0d4de',OFF:'#dff3e3',V:'#ffdce3'};
  const td=(v,style)=>`<td style="border:.5pt solid #999;text-align:center;${style||''}">${v}</td>`;
  let h=`<meta charset="UTF-8"><table>`;
  h+=`<tr><td></td><td></td><td colspan="${nd}" style="font-size:14pt;font-weight:bold;text-align:center">${y}년 ${m}월 근무표 (${esc(unit.name)})</td></tr>`;
  h+=`<tr>${td('성명','background:#333;color:#fff;font-weight:bold')}${td('구분','background:#333;color:#fff;font-weight:bold')}`;
  for(let d=1;d<=nd;d++){const w=new Date(y,m-1,d).getDay();h+=td(WD[w]+'<br>'+d,'background:#333;color:'+(w===0?'#ff8787':w===6?'#8fbaff':'#fff')+';font-weight:bold');}
  for(const c of ['D','E','S','N'])h+=td(c,'background:#333;color:#fff;font-weight:bold');
  h+=td('OFF계','background:#333;color:#fff;font-weight:bold')+td('연차계','background:#333;color:#fff;font-weight:bold')+td('근무계','background:#333;color:#fff;font-weight:bold')+'</tr>';
  for(const p of people){
    const c={D:0,E:0,S:0,N:0,OFF:0,V:0};
    let row='';
    for(let d=1;d<=nd;d++){
      const v=getCell(ym,p.id,d);
      if(v)c[v]++;
      row+=td(v==='V'?'연차':(v||''),v?('background:'+COLORS[v]):'');
    }
    h+=`<tr>${td(esc(p.name),'font-weight:bold')}${td(p.fix?('고정('+p.fix+')'):'교대(D/E/S/N)')}${row}${td(c.D)}${td(c.E)}${td(c.S)}${td(c.N)}${td(c.OFF)}${td(c.V)}${td(c.D+c.E+c.S+c.N)}</tr>`;
  }
  h+=`<tr>${td('')}${td('근무인원','font-weight:bold')}`;
  for(let d=1;d<=nd;d++){
    let c=0;
    for(const p of people){const v=getCell(ym,p.id,d);if(v==='D'||v==='E'||v==='S'||v==='N')c++;}
    h+=td(c);
  }
  h+=`</tr>`;
  for(const code of ['D','E','S','N','OFF','V']){
    h+=`<tr>${td('')}${td((code==='V'?'연차':code)+' 합계','font-weight:bold')}`;
    for(let d=1;d<=nd;d++){
      let c=0;
      for(const p of people)if(getCell(ym,p.id,d)===code)c++;
      let bg='';
      if(['D','E','S','N'].includes(code)){
        const need=unit.need[code]||0;
        if(c<need)bg='background:#ffb3b3';else if(c>need)bg='background:#ffe08a';
      }
      h+=td(c||'',bg);
    }
    h+=`</tr>`;
  }
  h+='</table>';
  const blob=new Blob(['﻿'+h],{type:'application/vnd.ms-excel'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`근무표_${ym}_${unit.name}.xls`;
  a.click();URL.revokeObjectURL(a.href);
}

/* ===== 엑셀 불러오기 (기존 근무표 엑셀을 읽어 이 유닛으로) ===== */
function loadSheetJS(){
  return new Promise((resolve,reject)=>{
    if(window.XLSX)return resolve(window.XLSX);
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload=()=>window.XLSX?resolve(window.XLSX):reject(new Error('엑셀 라이브러리 로드 실패'));
    s.onerror=()=>reject(new Error('엑셀 읽기 도구를 불러오지 못했습니다. 인터넷 연결을 확인하세요.'));
    document.head.appendChild(s);
  });
}
function normShift(raw){
  const r=String(raw||'').trim().toUpperCase();
  if(!r)return '';
  if(r==='D'||r==='E'||r==='S'||r==='N')return r;
  if(r[0]==='O'||r.includes('OFF')||r.includes('오프')||r.includes('휴'))return 'OFF';
  if(r.includes('연차')||r==='V'||r==='연')return 'V';
  return '';
}
const SKIP_NAME=/합계|인원|근무|계$|off|연차|교대|고정|구분|성명|이름|유닛|층/i;
function parseRosterGrid(rows){
  let headerRow=-1, dayCols={};
  for(let ri=0;ri<Math.min(rows.length,15);ri++){
    const row=rows[ri]||[], map={};
    for(let ci=0;ci<row.length;ci++){
      const val=parseInt(String(row[ci]).trim(),10);
      if(val>=1&&val<=31&&String(row[ci]).trim()===String(val))map[ci]=val;
    }
    const days=new Set(Object.values(map));
    if(days.size>=20&&days.has(1)&&days.has(15)){headerRow=ri;dayCols=map;break;}
  }
  if(headerRow<0)return null;
  const firstDayCol=Math.min(...Object.keys(dayCols).map(Number));
  // 성명 열: 날짜열 왼쪽에서 이름다운 텍스트가 가장 많은 (왼쪽 우선) 열
  let nameCol=0,bestCnt=0;
  for(let ci=0;ci<firstDayCol;ci++){
    let cnt=0;
    for(let ri=headerRow+1;ri<rows.length;ri++){
      const val=String((rows[ri]||[])[ci]||'').trim();
      if(val&&!/^\d+$/.test(val)&&!SKIP_NAME.test(val)&&!val.includes('(')&&!val.includes('/'))cnt++;
    }
    if(cnt>bestCnt){bestCnt=cnt;nameCol=ci;}
  }
  let ym=null;
  for(const row of rows){for(const cell of (row||[])){const mt=String(cell).match(/(\d{4})\s*년\s*(\d{1,2})\s*월/);if(mt){ym=mt[1]+'-'+String(+mt[2]).padStart(2,'0');break;}}if(ym)break;}
  const records=[];
  for(let ri=headerRow+1;ri<rows.length;ri++){
    const row=rows[ri]||[], name=String(row[nameCol]||'').trim();
    if(!name||SKIP_NAME.test(name)||/^\d+$/.test(name))continue;
    const days={};
    for(const ci in dayCols){const code=normShift(row[ci]);if(code)days[dayCols[ci]]=code;}
    if(Object.keys(days).length)records.push({name,days});
  }
  return {ym,days:Object.values(dayCols),records};
}
function importXls(file){
  loadSheetJS().then(XLSX=>{
    const r=new FileReader();
    r.onload=e=>{
      let wb;
      try{wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});}
      catch(err){alert('엑셀 파일을 읽을 수 없습니다: '+err.message);return;}
      let parsed=null;
      for(const nm of wb.SheetNames){
        const rows=XLSX.utils.sheet_to_json(wb.Sheets[nm],{header:1,blankrows:false,defval:''});
        const p=parseRosterGrid(rows);
        if(p&&p.records.length){parsed=p;break;}
      }
      if(!parsed){alert('근무표 형식을 찾지 못했습니다.\n성명 열과 1~31 날짜가 가로로 있는 시트여야 합니다.');return;}
      applyImport(parsed);
    };
    r.readAsArrayBuffer(file);
  }).catch(err=>alert(err.message));
}
function applyImport(parsed){
  const unit=unitById(S.ui.unitId);
  if(!unit){alert('먼저 유닛을 선택하세요.');return;}
  const targetYm=parsed.ym||S.ui.ym;
  const byName={};for(const p of unitStaff(unit.id))byName[p.name]=p;
  const matched=parsed.records.filter(r=>byName[r.name]);
  const unmatched=parsed.records.filter(r=>!byName[r.name]);
  let msg=`「${unit.name}」 유닛에 ${targetYm} 근무표를 불러옵니다.\n인식 ${parsed.records.length}명 · 이름 매칭 ${matched.length}명`;
  if(unmatched.length)msg+=`\n미매칭: ${unmatched.map(r=>r.name).join(', ')}`;
  if(!confirm(msg+'\n\n계속할까요?'))return;
  let addMissing=false;
  if(unmatched.length)addMissing=confirm(`미매칭 ${unmatched.length}명(${unmatched.map(r=>r.name).join(', ')})을 「${unit.name}」에 새 직원으로 추가할까요?\n취소 = 매칭된 직원만 반영`);
  if(!S.roster[targetYm])S.roster[targetYm]={};
  const apply=(pid,days)=>{const o={};for(const d in days)o[d]=days[d];S.roster[targetYm][pid]=o;};
  for(const rec of matched)apply(byName[rec.name].id,rec.days);
  if(addMissing)for(const rec of unmatched){const np={id:uid(),name:rec.name,unitId:unit.id,fix:''};S.staff.push(np);apply(np.id,rec.days);}
  S.ui.ym=targetYm;
  save();render();
  alert(`불러오기 완료: ${targetYm} · ${matched.length+(addMissing?unmatched.length:0)}명 반영`);
}

/* ===== 휴일계산 탭 ===== */
function renderCalc(){
  const root=document.getElementById('tab-calc');
  const yr=S.ui.calcYear;
  if(!S.holidays[yr])S.holidays[yr]=Array(12).fill(0);
  if(!S.offs[yr])S.offs[yr]=Array(12).fill(9);
  const H=S.holidays[yr],O=S.offs[yr];
  const sumH=H.reduce((a,b)=>a+(+b||0),0),sumO=O.reduce((a,b)=>a+(+b||0),0);
  const sumA=H.reduce((a,b,i)=>a+Math.max(0,(+b||0)-(+O[i]||0)),0);
  const perMonthHours=(sumA*8*1.5/12);

  let html=`<div class="card"><div class="row">
    <h2 style="margin:0">휴일수 계산</h2>
    <select id="calcYear">${Object.keys(S.holidays).sort().map(v=>`<option ${v===yr?'selected':''}>${v}</option>`).join('')}</select>
    <button class="btn" id="addYear">연도 추가</button>
    <button class="btn" id="autoHoliday">휴일수 자동 계산</button>
    <div class="spacer"></div>
    <span class="hint">공휴일 수(주말+법정공휴일)와 그 달 오프수를 입력하면 휴일수당 일수가 자동 계산됩니다.</span>
  </div>
  <div style="overflow:auto;margin-top:12px"><table class="calc"><tr><th>월</th>${Array.from({length:12},(_,i)=>`<th>${i+1}월</th>`).join('')}<th>계</th></tr>
  <tr><td class="lbl">공휴일</td>${H.map((v,i)=>`<td><input type="number" min="0" max="20" value="${v}" data-k="h" data-i="${i}"></td>`).join('')}<td><b>${sumH}</b></td></tr>
  <tr><td class="lbl">오프수</td>${O.map((v,i)=>`<td><input type="number" min="0" max="20" value="${v}" data-k="o" data-i="${i}"></td>`).join('')}<td><b>${sumO}</b></td></tr>
  <tr class="total"><td class="lbl">휴일수당</td>${H.map((v,i)=>{const d=(+v||0)-(+O[i]||0);return `<td class="${d<0?'neg':''}">${d}</td>`;}).join('')}<td>${sumA}</td></tr>
  </table></div>
  <p class="hint" style="margin-top:8px">휴일수당 ${sumA}일 × 8시간 × 1.5 ÷ 12개월 = <b>월 ${perMonthHours.toFixed(1)}시간</b></p>
  </div>`;

  /* 유닛별 소요/연차여유 */
  html+=`<div class="card"><h2>유닛별 인력 소요 (${yr}년)</h2>
  <p class="hint" style="margin-bottom:12px">합계 = 인원×일수. 계 = OFF배정 + 교대별 필요인원×일수. 연차여유 = 합계 − 계 (그 달에 소화 가능한 연차 개수, 음수면 인원 부족).</p>
  <div class="unitcards">`;
  for(const u of S.units){
    const n=unitStaff(u.id).length||0;
    html+=`<div><h3>${esc(u.name)} — ${n}명 / 하루 D${u.need.D||0}·E${u.need.E||0}·S${u.need.S||0}·N${u.need.N||0}</h3>
    <div style="overflow:auto"><table class="calc"><tr><th>월</th><th>일수</th><th>합계</th><th>OFF</th><th>D</th><th>E</th><th>S</th><th>N</th><th>계</th><th>연차여유</th></tr>`;
    for(let m=1;m<=12;m++){
      const nd=daysIn(+yr,m);
      const total=n*nd;
      const off=n*(+O[m-1]||0);
      const need={};let needSum=0;
      for(const c of ['D','E','S','N']){need[c]=(u.need[c]||0)*nd;needSum+=need[c];}
      const used=off+needSum;
      const slack=total-used;
      html+=`<tr><td>${m}월</td><td>${nd}</td><td>${total}</td><td>${off}</td><td>${need.D}</td><td>${need.E}</td><td>${need.S}</td><td>${need.N}</td><td>${used}</td><td class="${slack<0?'neg':''}"><b>${slack}</b></td></tr>`;
    }
    html+=`</table></div></div>`;
  }
  html+=`</div></div>`;
  root.innerHTML=html;

  root.querySelectorAll('table.calc input[type=number]').forEach(inp=>{
    inp.onchange=()=>{
      const i=+inp.dataset.i,v=+inp.value||0;
      if(inp.dataset.k==='h')S.holidays[yr][i]=v; else S.offs[yr][i]=v;
      save();renderCalc();
    };
  });
  root.querySelector('#calcYear').onchange=e=>{S.ui.calcYear=e.target.value;save();renderCalc();};
  root.querySelector('#addYear').onclick=()=>{
    const v=prompt('추가할 연도 (예: 2027)');
    if(!v||!/^\d{4}$/.test(v.trim()))return;
    const y=v.trim();
    if(!S.holidays[y]){
      S.holidays[y]=KR_HOLIDAYS[+y]?autoHolidayCounts(+y):Array(12).fill(0);
      S.offs[y]=Array(12).fill(9);
    }
    S.ui.calcYear=y;save();renderCalc();
  };
  root.querySelector('#autoHoliday').onclick=()=>{
    const y=+yr;
    const auto=autoHolidayCounts(y);
    const note=KR_HOLIDAYS[y]?'주말+법정공휴일(대체공휴일 포함) 기준으로 다시 계산합니다.':'이 연도는 공휴일 목록이 없어 주말만 계산됩니다. 공휴일은 표에서 직접 더해주세요.';
    if(!confirm(note+'\n지금 입력된 값을 덮어씁니다. 계속할까요?'))return;
    S.holidays[yr]=auto;save();renderCalc();
  };
}

/* ===== 급여 탭 ===== */
function renderPay(){
  const root=document.getElementById('tab-pay');
  const ym=S.ui.ym,[y,m]=ymParts(ym),nd=daysIn(y,m);
  const won=v=>Math.round(v).toLocaleString('ko-KR');
  /* 휴일가산: 엑셀 공식 그대로 — 연간 (공휴일−오프수) 합 × 8시간 × 1.5 ÷ 12개월 = 월 고정 가산시간 */
  const H=S.holidays[String(y)]||[],O=S.offs[String(y)]||[];
  const holiHours=H.reduce((a,b,i)=>a+Math.max(0,(+b||0)-(+O[i]||0)),0)*8*1.5/12;

  let html=`<div class="card"><div class="row">
    <div class="month-nav">
      <button class="btn" id="payPrevM">&lt;</button>
      <b>${y}년 ${m}월</b>
      <button class="btn" id="payNextM">&gt;</button>
    </div>
    <div class="spacer"></div>
    <label>야간 1회당 가산 환산시간 <input type="number" min="0" max="12" step="0.5" id="nightH" value="${S.payCfg.nightH}"></label>
  </div>
  <p class="hint" style="margin-top:8px">기본급 = 근무시간 × 시급. 야간가산 = 야간(N) 횟수 × 가산시간 × 시급 (기본 4시간 = 8시간의 0.5배). 휴일가산 = 월 ${holiHours.toFixed(1)}시간 × 시급 (휴일계산 탭의 연간 휴일수당 ÷ 12개월, 엑셀과 같은 공식). 참고용 계산이며 주휴수당·4대보험·세금은 반영하지 않습니다.</p></div>`;

  let gTotal=0;
  html+=`<div class="card"><div style="overflow:auto"><table class="calc"><tr><th>유닛</th><th>이름</th><th>D</th><th>E</th><th>S</th><th>N</th><th>근무시간</th><th>시급</th><th>기본급</th><th>야간가산</th><th>휴일가산</th><th>합계</th></tr>`;
  for(const u of S.units){
    for(const p of unitStaff(u.id)){
      const c={D:0,E:0,S:0,N:0};
      for(let d=1;d<=nd;d++){const v=getCell(ym,p.id,d);if(c[v]!==undefined)c[v]++;}
      const hours=c.D*S.shifts.D.hours+c.E*S.shifts.E.hours+c.S*S.shifts.S.hours+c.N*S.shifts.N.hours;
      const wage=+p.wage||0;
      const base=hours*wage;
      const night=c.N*(+S.payCfg.nightH||0)*wage;
      const holi=holiHours*wage;
      const total=base+night+holi;
      gTotal+=total;
      html+=`<tr><td>${esc(u.name)}</td><td class="lbl">${esc(p.name)}</td>
        <td>${c.D}</td><td>${c.E}</td><td>${c.S}</td><td>${c.N}</td><td>${hours}</td>
        <td><input type="number" min="0" step="10" value="${wage||''}" placeholder="시급" data-wage="${p.id}" style="width:80px"></td>
        <td>${wage?won(base):'-'}</td><td>${wage?won(night):'-'}</td><td>${wage?won(holi):'-'}</td><td><b>${wage?won(total):'-'}</b></td></tr>`;
    }
  }
  html+=`<tr class="total"><td colspan="11" style="text-align:right">전체 합계</td><td>${won(gTotal)}</td></tr>`;
  html+=`</table></div></div>`;
  root.innerHTML=html;

  root.querySelector('#payPrevM').onclick=()=>{S.ui.ym=shiftYm(S.ui.ym,-1);save();renderPay();};
  root.querySelector('#payNextM').onclick=()=>{S.ui.ym=shiftYm(S.ui.ym,1);save();renderPay();};
  root.querySelector('#nightH').onchange=e=>{S.payCfg.nightH=+e.target.value||0;save();renderPay();};
  root.querySelectorAll('input[data-wage]').forEach(inp=>{
    inp.onchange=()=>{
      const p=S.staff.find(x=>x.id===inp.dataset.wage);
      if(p){p.wage=+inp.value||0;save();renderPay();}
    };
  });
}

/* ===== 설정 탭 ===== */
function renderSettings(){
  const root=document.getElementById('tab-settings');
  let html=`<div class="card"><h2>유닛과 하루 필요인원</h2>
  <div style="overflow:auto"><table class="set"><tr><th>유닛명</th><th>D</th><th>E</th><th>S</th><th>N</th><th>인원</th><th></th></tr>`;
  for(const u of S.units){
    html+=`<tr>
      <td><input type="text" value="${esc(u.name)}" data-u="${u.id}" data-k="name"></td>
      ${['D','E','S','N'].map(c=>`<td><input type="number" min="0" max="20" value="${u.need[c]||0}" data-u="${u.id}" data-k="${c}"></td>`).join('')}
      <td>${unitStaff(u.id).length}명</td>
      <td><button class="btn danger" data-del-u="${u.id}">삭제</button></td></tr>`;
  }
  html+=`</table></div>
  <div class="row" style="margin-top:10px"><button class="btn" id="addUnit">유닛 추가</button></div></div>`;

  html+=`<div class="card"><h2>직원 명단</h2>`;
  for(const u of S.units){
    const ppl=unitStaff(u.id);
    html+=`<h3>${esc(u.name)} (${ppl.length}명)</h3><div class="stafflist">`;
    html+=ppl.map(p=>`<span class="chip"><span data-rename="${p.id}" title="이름 바꾸기" style="cursor:pointer">${esc(p.name)}</span>
      <select data-fix="${p.id}" title="고정 근무" style="border:0;background:none;font-size:12px;color:var(--sub);padding:0">
        <option value="">교대</option>
        ${['D','E','S','N'].map(c=>`<option value="${c}" ${p.fix===c?'selected':''}>${c} 고정</option>`).join('')}
      </select>
      <button data-del-p="${p.id}" title="삭제">×</button></span>`).join('');
    html+=`</div><div class="row" style="margin-top:8px">
      <input type="text" placeholder="이름 (쉼표로 여러 명)" data-add-input="${u.id}" style="width:240px">
      <button class="btn" data-add-p="${u.id}">추가</button>
      <span style="color:var(--line)">|</span>
      <input type="number" min="1" max="99" placeholder="인원수" data-cnt-input="${u.id}" style="width:90px">
      <button class="btn" data-add-cnt="${u.id}">A, B, C 이름으로 추가</button>
      <span class="hint">이름은 나중에 클릭해서 바꿀 수 있어요</span></div>`;
  }
  html+=`</div>`;

  html+=`<div class="card"><h2>근무유형</h2>
  <div style="overflow:auto"><table class="set"><tr><th>코드</th><th>이름</th><th>근무시간</th></tr>`;
  for(const c of SHIFT_CODES){
    const sh=S.shifts[c];
    html+=`<tr><td><b>${c==='V'?'연차':c}</b></td>
      <td><input type="text" value="${esc(sh.label)}" data-sh="${c}" data-k="label"></td>
      <td><input type="number" min="0" max="24" value="${sh.hours}" data-sh="${c}" data-k="hours" ${c==='OFF'||c==='V'?'disabled':''}></td></tr>`;
  }
  html+=`</table></div></div>`;

  html+=`<div class="card"><h2>데이터 백업</h2>
  <div class="row">
    <button class="btn" id="exportBtn">백업 파일 내려받기</button>
    <label class="btn" style="display:inline-block;cursor:pointer">백업 불러오기<input type="file" id="importFile" accept=".json" style="display:none"></label>
    <span class="hint">데이터는 이 브라우저에 저장됩니다. 다른 컴퓨터로 옮기거나 만약을 대비해 가끔 백업 파일을 받아두세요.</span>
  </div></div>`;

  root.innerHTML=html;

  root.querySelectorAll('input[data-u]').forEach(inp=>{
    inp.onchange=()=>{
      const u=unitById(inp.dataset.u);if(!u)return;
      if(inp.dataset.k==='name')u.name=inp.value.trim()||u.name;
      else u.need[inp.dataset.k]=+inp.value||0;
      save();renderSettings();
    };
  });
  root.querySelectorAll('[data-del-u]').forEach(b=>{
    b.onclick=()=>{
      const u=unitById(b.dataset.delU);
      const n=unitStaff(u.id).length;
      if(!confirm(`「${u.name}」 유닛을 삭제할까요?${n?` 소속 직원 ${n}명도 함께 삭제됩니다.`:''}`))return;
      S.staff=S.staff.filter(p=>p.unitId!==u.id);
      S.units=S.units.filter(x=>x.id!==u.id);
      if(S.ui.unitId===u.id)S.ui.unitId=S.units[0]?.id||'';
      save();renderSettings();
    };
  });
  root.querySelector('#addUnit').onclick=()=>{
    const name=prompt('유닛 이름');
    if(!name||!name.trim())return;
    S.units.push({id:uid(),name:name.trim(),need:{D:1,E:1,S:1,N:1}});
    save();renderSettings();
  };
  root.querySelectorAll('[data-add-p]').forEach(b=>{
    b.onclick=()=>{
      const inp=root.querySelector(`input[data-add-input="${b.dataset.addP}"]`);
      const names=inp.value.split(',').map(s=>s.trim()).filter(Boolean);
      if(!names.length)return;
      for(const nm of names)S.staff.push({id:uid(),name:nm,unitId:b.dataset.addP});
      inp.value='';save();renderSettings();
    };
  });
  root.querySelectorAll('input[data-add-input]').forEach(inp=>{
    inp.onkeydown=e=>{if(e.key==='Enter')root.querySelector(`[data-add-p="${inp.dataset.addInput}"]`).click();};
  });
  const abc=i=>{let s='';i++;while(i>0){i--;s=String.fromCharCode(65+i%26)+s;i=Math.floor(i/26);}return s;}; // 0→A … 25→Z, 26→AA
  root.querySelectorAll('[data-add-cnt]').forEach(b=>{
    b.onclick=()=>{
      const inp=root.querySelector(`input[data-cnt-input="${b.dataset.addCnt}"]`);
      const cnt=Math.min(99,+inp.value||0);
      if(cnt<1)return;
      const used=new Set(S.staff.filter(p=>p.unitId===b.dataset.addCnt).map(p=>p.name));
      let i=0,made=0;
      while(made<cnt){
        const nm=abc(i++);
        if(used.has(nm))continue;
        S.staff.push({id:uid(),name:nm,unitId:b.dataset.addCnt,fix:''});
        made++;
      }
      inp.value='';save();renderSettings();
    };
  });
  root.querySelectorAll('[data-rename]').forEach(el=>{
    el.onclick=()=>{
      const p=S.staff.find(x=>x.id===el.dataset.rename);
      const nm=prompt('새 이름',p.name);
      if(nm&&nm.trim()){p.name=nm.trim();save();renderSettings();}
    };
  });
  root.querySelectorAll('select[data-fix]').forEach(sel=>{
    sel.onchange=()=>{
      const p=S.staff.find(x=>x.id===sel.dataset.fix);
      if(p){p.fix=sel.value;save();}
    };
  });
  root.querySelectorAll('[data-del-p]').forEach(b=>{
    b.onclick=()=>{
      const p=S.staff.find(x=>x.id===b.dataset.delP);
      if(!confirm(`${p.name} 님을 삭제할까요? 과거 근무표 기록도 화면에서 사라집니다.`))return;
      S.staff=S.staff.filter(x=>x.id!==p.id);
      save();renderSettings();
    };
  });
  root.querySelectorAll('input[data-sh]').forEach(inp=>{
    inp.onchange=()=>{
      const sh=S.shifts[inp.dataset.sh];
      if(inp.dataset.k==='label')sh.label=inp.value.trim()||sh.label;
      else sh.hours=+inp.value||0;
      save();
    };
  });
  root.querySelector('#exportBtn').onclick=()=>{
    const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='요양근무표_백업_'+new Date().toISOString().slice(0,10)+'.json';
    a.click();URL.revokeObjectURL(a.href);
  };
  root.querySelector('#importFile').onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=()=>{
      try{
        const d=JSON.parse(r.result);
        if(!d.units||!d.roster)throw new Error('형식 오류');
        if(!confirm('현재 데이터를 백업 파일 내용으로 교체합니다. 계속할까요?'))return;
        S=d;save();render();
      }catch(err){alert('백업 파일을 읽을 수 없습니다: '+err.message);}
    };
    r.readAsText(f);
  };
}

/* ===== 렌더 ===== */
function render(){
  const t=activeTab();
  if(t==='roster')renderRoster();
  else if(t==='calc')renderCalc();
  else if(t==='pay')renderPay();
  else renderSettings();
}
render();
</script>
</body>
</html>
